<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>WhatsApp Bot · Bootstrap</title>
  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* minimal custom overrides for polish */
    body {
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card-whatsapp {
      max-width: 540px;
      width: 100%;
      border: none;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
      background: white;
      transition: 0.2s;
    }
    .card-whatsapp .card-body {
      padding: 2rem 1.8rem;
    }
    .brand-icon {
      color: #075e54;
    }
    .input-group-clean .form-control {
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      border: 2px solid #e0e0e0;
      font-size: 1rem;
      text-align: center;
      transition: 0.15s;
    }
    .input-group-clean .form-control:focus {
      border-color: #25D366;
      box-shadow: 0 0 0 0.2rem rgba(37, 211, 102, 0.2);
    }
    .btn-wa {
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      font-weight: 600;
      background: #25D366;
      border: none;
      color: white;
      transition: 0.2s;
      width: 100%;
    }
    .btn-wa:hover:not(:disabled) {
      background: #128C7E;
      color: white;
    }
    .btn-wa:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .code-box {
      background: linear-gradient(145deg, #f8f9fa, #e9ecef);
      border-radius: 20px;
      padding: 1.5rem 0.5rem;
      border: 2px dashed #25D366;
      transition: 0.25s;
    }
    .code-digit {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: #075e54;
      background: white;
      padding: 0.5rem 1rem;
      border-radius: 16px;
      border: 2px solid #25D366;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      user-select: all;
      display: inline-block;
      min-width: 200px;
    }
    .status-badge {
      background: #d4edda;
      color: #155724;
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      font-weight: 600;
    }
    .toast-custom {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      max-width: 90%;
      min-width: 200px;
      border-radius: 60px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      background: #333;
      color: white;
      padding: 0.75rem 1.5rem;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.2s ease;
      pointer-events: none;
    }
    .toast-custom.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
    .toast-custom.success {
      background: #28a745;
    }
    .toast-custom.error {
      background: #dc3545;
    }
    .fade-in {
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card-whatsapp .card-body {
        padding: 1.5rem 1rem;
      }
      .code-digit {
        font-size: 2rem;
        letter-spacing: 5px;
        min-width: 160px;
        padding: 0.4rem 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- toast -->
  <div id="toast" class="toast-custom">Message</div>

  <!-- main card -->
  <div class="card card-whatsapp">
    <div class="card-body">
      <div class="text-center mb-4">
        <i class="bi bi-whatsapp display-4 brand-icon"></i>
        <h1 class="h3 mt-2 fw-bold" style="color: #075e54;">WhatsApp Bot</h1>
        <p class="text-muted small">Link your device via pairing code</p>
      </div>

      <!-- phone input -->
      <div class="input-group-clean mb-3">
        <input type="text" id="phoneInput" class="form-control" 
               placeholder="e.g. 94759952830" value="94759952830" 
               inputmode="numeric" autocomplete="tel">
      </div>

      <!-- connect button -->
      <button id="connectBtn" class="btn btn-wa mb-3">
        <i class="bi bi-link-45deg me-1"></i> Connect
      </button>

      <!-- pairing code card -->
      <div id="pairContainer" class="code-box text-center d-none">
        <h5 class="fw-semibold mb-2" style="color: #075e54;">
          <i class="bi bi-key-fill me-1"></i> Pairing Code
        </h5>
        <div id="codeDisplay" class="code-digit mb-2">------</div>
        <p class="small text-muted mb-0">
          <i class="bi bi-info-circle"></i> Enter code in WhatsApp → Settings → Linked Devices
        </p>
      </div>

      <!-- connected message -->
      <div id="connectedMessage" class="mt-3 d-none">
        <div class="status-badge text-center">
          <i class="bi bi-check-circle-fill me-1"></i> Already connected!
        </div>
      </div>

      <!-- extra hint (optional) -->
      <div class="mt-3 text-center text-muted small">
        <i class="bi bi-shield-check"></i> secure pairing
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optional for toggles etc) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function() {
      // DOM refs
      const phoneInput = document.getElementById('phoneInput');
      const connectBtn = document.getElementById('connectBtn');
      const pairContainer = document.getElementById('pairContainer');
      const codeDisplay = document.getElementById('codeDisplay');
      const connectedMessage = document.getElementById('connectedMessage');
      const toastEl = document.getElementById('toast');

      // state
      let activePhoneNumber = null;
      let statusCheckInterval = null;

      // --- toast helpers ---
      function showToast(msg, type = 'info', duration = 3500) {
        toastEl.textContent = msg;
        toastEl.className = 'toast-custom';
        if (type === 'success') toastEl.classList.add('success');
        else if (type === 'error') toastEl.classList.add('error');
        toastEl.classList.add('show');
        clearTimeout(toastEl._hideTimer);
        toastEl._hideTimer = setTimeout(() => {
          toastEl.classList.remove('show');
        }, duration);
      }

      // --- reset UI (keep phone enabled) ---
      function resetUI(keepPhoneEnabled = true) {
        connectBtn.disabled = false;
        connectBtn.innerHTML = '<i class="bi bi-link-45deg me-1"></i> Connect';
        pairContainer.classList.add('d-none');
        connectedMessage.classList.add('d-none');
        if (!keepPhoneEnabled) {
          phoneInput.disabled = false;
        } else {
          phoneInput.disabled = false; // always enable
        }
        if (statusCheckInterval) {
          clearInterval(statusCheckInterval);
          statusCheckInterval = null;
        }
      }

      // --- check status from server ---
      async function checkStatus(phoneNumber) {
        if (!phoneNumber) return;
        try {
          const resp = await fetch(`/status/${phoneNumber}`);
          const data = await resp.json();

          if (data.status === 'connected' || data.isConnected) {
            // connected
            connectBtn.disabled = true;
            connectBtn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Connected';
            connectedMessage.classList.remove('d-none');

            // if we have a pairing code, show it
            if (data.pairingCode) {
              codeDisplay.textContent = data.pairingCode;
              pairContainer.classList.remove('d-none');
            } else {
              // if no pairing code but connected, hide code container
              pairContainer.classList.add('d-none');
            }

            // stop polling
            if (statusCheckInterval) {
              clearInterval(statusCheckInterval);
              statusCheckInterval = null;
            }
          } else {
            // not connected – keep UI as is, but we might show code if exists
            if (data.pairingCode) {
              codeDisplay.textContent = data.pairingCode;
              pairContainer.classList.remove('d-none');
            }
          }
        } catch (err) {
          console.warn('status check error', err);
        }
      }

      // --- connect action ---
      async function handleConnect() {
        const raw = phoneInput.value.trim();
        if (!raw) {
          showToast('Please enter your phone number', 'error');
          return;
        }
        const cleanNumber = raw.replace(/\D/g, '');
        if (cleanNumber.length < 10) {
          showToast('Enter a valid phone number (min 10 digits)', 'error');
          return;
        }

        activePhoneNumber = cleanNumber;

        // UI loading
        connectBtn.disabled = true;
        connectBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> Connecting...';
        phoneInput.disabled = true;
        pairContainer.classList.add('d-none');
        connectedMessage.classList.add('d-none');

        try {
          const response = await fetch('/init-connection', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phoneNumber: cleanNumber })
          });

          const data = await response.json();

          if (response.ok && data.code) {
            // show pairing code
            codeDisplay.textContent = data.code;
            pairContainer.classList.remove('d-none');
            connectBtn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Code Generated';
            connectBtn.disabled = true;
            phoneInput.disabled = false;  // allow edit but button stays disabled
            showToast('✅ Pairing code generated!', 'success', 5000);

            // start polling
            if (statusCheckInterval) clearInterval(statusCheckInterval);
            statusCheckInterval = setInterval(() => {
              checkStatus(cleanNumber);
            }, 3000);
            // immediate first check
            setTimeout(() => checkStatus(cleanNumber), 800);

          } else if (response.ok && (data.status === 'connected' || data.isConnected)) {
            // already connected
            connectBtn.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Connected';
            connectBtn.disabled = true;
            connectedMessage.classList.remove('d-none');
            if (data.code) {
              codeDisplay.textContent = data.code;
              pairContainer.classList.remove('d-none');
            }
            showToast('✅ Already connected!', 'success');
            phoneInput.disabled = false;
          } else {
            // error
            resetUI(false);
            showToast('❌ Failed to connect', 'error');
          }
        } catch (err) {
          console.error('Connection error', err);
          resetUI(false);
          showToast('❌ Connection error', 'error');
        }
      }

      // --- attach events ---
      connectBtn.addEventListener('click', handleConnect);

      phoneInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          handleConnect();
        }
      });

      // --- auto status check on load ---
      window.addEventListener('load', () => {
        const initial = phoneInput.value.trim();
        if (initial) {
          const clean = initial.replace(/\D/g, '');
          if (clean.length >= 10) {
            // wait a moment for server
            setTimeout(() => checkStatus(clean), 600);
          }
        }
      });

      // expose reset if needed (but not used)
      window.__resetUI = resetUI;
    })();
  </script>
</body>
</html>
